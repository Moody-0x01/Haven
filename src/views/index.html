<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallhaven Explorer</title>
    <style>
        :root {
            --bg-color: #0a0a0a;             /* Pure matte midnight charcoal */
            --card-bg: #161616;              /* Obsidian glass card backgrounds */
            --text-color: #ededed;           /* Crisp silver-white text */
            --accent-color: #ffffff;         /* Pure minimalist white accents */
            --accent-hover: #e5c07b;         /* Subtle warm amber on hover interactions */
            --input-bg: #111111;             /* Deep slate input boxes */
            --border-color: #222222;         /* Sleek, subtle structural borders */
            --text-muted: #a3a3a3;           /* Clean muted grey for metadata */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-hover);
        }

        /* --- Refined Search Bar Chemistry --- */
        .search-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            margin-bottom: 2.5rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-input {
            flex: 2;
            min-width: 260px;
            padding: 0.7rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.3px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .select-count {
            padding: 0 1rem;
            font-size: 0.9rem;
            font-weight: 400;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .select-count:focus {
            border-color: var(--accent-color);
        }

        .btn {
            padding: 0.7rem 1.4rem;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.3px;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--text-color);
            border-color: var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: translateY(-1px);
        }

        /* --- Tab bar styles --- */
        .tabs-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 2.5rem;
            padding-bottom: 10px;
        }

        .tab {
            padding: 0.5rem 1.2rem;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.3px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--text-color);
            background-color: rgba(255, 255, 255, 0.03);
        }

        .tab.active {
            color: var(--accent-color);
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--border-color);
        }

        /* --- Cards and Grid Layout --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .card {
            position: relative;
            background-color: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.25s ease, border-color 0.25s ease;
            aspect-ratio: 16 / 9;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .card:active {
            transform: translateY(-2px);
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .card:hover .card-img {
            transform: scale(1.03);
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(10, 10, 10, 0.95) 0%, rgba(10, 10, 10, 0.4) 60%, rgba(10, 10, 10, 0) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.4rem;
            opacity: 0;
            transition: opacity 0.25s ease;
            box-sizing: border-box;
            z-index: 2;
        }

        .card:hover .card-overlay {
            opacity: 1;
        }

        .card-overlay-footer {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-color);
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            letter-spacing: 0.3px;
        }

        .card-meta span strong {
            color: var(--accent-hover);
        }

        .card-actions {
            display: flex;
            justify-content: flex-start; /* Aligns "View Raw" to the left */
            pointer-events: auto;
        }

        .view-link {
            font-size: 0.8rem;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 400;
            letter-spacing: 0.5px;
            background: rgba(10, 10, 10, 0.85);
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .view-link span {
            transition: transform 0.2s ease;
        }

        .view-link:hover {
            color: #000;
            border-color: var(--accent-hover);
            background: var(--accent-hover);
        }

        .view-link:hover span {
            transform: translateX(2px);
        }

        /* --- Fullscreen Lightbox Modal --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 5, 0.98);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            z-index: 1010;
        }

        .lightbox-close:hover {
            background: var(--accent-color);
            color: #000;
            transform: rotate(90deg);
        }

        /* Navigation Arrows */
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            font-size: 1.5rem;
            width: 50px;
            height: 60px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 1010;
            user-select: none;
        }

        .lightbox-nav:hover {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        .lightbox-nav-left {
            left: 25px;
        }

        .lightbox-nav-right {
            right: 25px;
        }

        .lightbox-content {
            position: relative;
            max-width: 80%;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .lightbox.active .lightbox-img {
            opacity: 1;
            transform: scale(1);
        }

        .lightbox-info {
            margin-top: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            z-index: 1005;
        }

        .lightbox-info h3 {
            color: var(--text-color);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .lightbox-details {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 5px;
        }

        .lightbox-details span strong {
            color: var(--accent-hover);
        }

        /* --- Toast Notification --- */
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: var(--card-bg);
            color: var(--text-color);
            border-left: 4px solid var(--accent-hover);
            padding: 12px 20px;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* --- Loading State & Spinner --- */
        .status-message {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Haven<span>Wallpapers</span></h1>
            <p>Fetch and explore beautifully cataloged desktop backgrounds</p>
        </header>

        <div class="search-area">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Search wallpapers (e.g. anime, nature)..."
                onkeydown="if(event.key === 'Enter') fetchSearch()"
            >
            <button class="btn btn-primary" onclick="fetchSearch()">Search</button>
            <button class="btn btn-secondary" onclick="fetchLucky()">🎲 I'm Feeling Lucky</button>
            <select id="limitSelect" class="select-count" title="Entries count">
                <option value="10">10</option>
                <option value="24" selected>24</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>

        <div class="tabs-container">
            <button id="tab-all" class="tab" onclick="switchTab('all')">All</button>
            <button id="tab-most" class="tab" onclick="switchTab('most')">Best 🔥</button>
            <button id="tab-general" class="tab" onclick="switchTab('general')">General</button>
            <button id="tab-anime" class="tab active" onclick="switchTab('anime')">Anime</button>
            <button id="tab-people" class="tab" onclick="switchTab('people')">People</button>
        </div>

        <main id="wallpaperGrid" class="grid">
            <div class="status-message">Loading system...</div>
        </main>
    </div>

    <!-- Lightbox with arrow controls -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
        
        <button class="lightbox-nav lightbox-nav-left" onclick="navigateLightbox(-1, event)">&#8592;</button>
        <button class="lightbox-nav lightbox-nav-right" onclick="navigateLightbox(1, event)">&#8594;</button>

        <div class="lightbox-content">
            <img id="lightboxImg" class="lightbox-img" src="" alt="Fullscreen wallpaper">
        </div>
        <div class="lightbox-info">
            <h3 id="lightboxTitle">Wallpaper Details</h3>
            <div id="lightboxDetails" class="lightbox-details"></div>
        </div>
    </div>

    <div id="toast" class="toast">Opening raw wallpaper! Press Ctrl + S to save.</div>

    <script>
        const grid = document.getElementById('wallpaperGrid');
        const searchInput = document.getElementById('searchInput');
        const limitSelect = document.getElementById('limitSelect');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxTitle = document.getElementById('lightboxTitle');
        const lightboxDetails = document.getElementById('lightboxDetails');
        const toast = document.getElementById('toast');
        
        let allWallpapers = []; 
        let currentTab = 'anime'; 
        let currentLightboxIndex = -1;

        window.addEventListener('DOMContentLoaded', () => {
            fetchLucky();
        });

        // Keybindings for escaping lightbox and navigating images
        window.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') {
                closeLightbox(e);
            } else if (e.key === 'ArrowLeft') {
                navigateLightbox(-1, e);
            } else if (e.key === 'ArrowRight') {
                navigateLightbox(1, e);
            }
        });

        function showLoading() {
            grid.innerHTML = `
                <div class="status-message">
                    <div class="spinner"></div>
                    <div>Fetching wallpapers...</div>
                </div>
            `;
        }

        function showError(msg) {
            grid.innerHTML = `<div class="status-message" style="color: #ff5555;">⚠️ Error: ${msg}</div>`;
        }

        function downloadWallpaper(url) {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);

            const win = window.open(url, '_blank');
            if (win) win.focus();
        }

        // Get sorted/filtered wallpapers list matching currently active tab
        function getActiveList() {
            let filtered = [...allWallpapers];

            if (currentTab === 'most') {
                filtered.sort((a, b) => (b.views || 0) - (a.views || 0));
            } else if (currentTab !== 'all') {
                filtered = filtered.filter(item => {
                    const itemCategory = (item.category || '').toLowerCase();
                    return itemCategory === currentTab;
                });
            }
            return filtered;
        }

        function renderWallpapers() {
            const activeWallpapers = getActiveList();

            if (activeWallpapers.length === 0) {
                if (allWallpapers.length === 0) {
                    grid.innerHTML = '<div class="status-message">No wallpapers found. Try another search query!</div>';
                } else {
                    grid.innerHTML = `<div class="status-message">No wallpapers in the "${currentTab}" category for this result set.</div>`;
                }
                return;
            }

            grid.innerHTML = activeWallpapers.map((item, index) => {
                const imgUrl = item.thumbs?.large || item.path; 
                const originalUrl = item.path || item.url;
                const resolution = item.resolution || `${item.dimension_x}x${item.dimension_y}`;

                return `
                    <article class="card" onclick="openLightbox(${index}, event)">
                        <img src="${imgUrl}" alt="Wallpaper ${item.id}" class="card-img" loading="lazy">
                        <div class="card-overlay">
                            <div class="card-overlay-footer">
                                <div class="card-meta">
                                    <span>Resolution: <strong>${resolution}</strong></span>
                                    <span>Views: <strong>${item.views || 0}</strong></span>
                                </div>
                                <div class="card-actions">
                                    <a href="${originalUrl}" target="_blank" class="view-link" onclick="event.stopPropagation();">
                                        View Raw <span>&rarr;</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function openLightbox(index, event) {
            if (event && event.target.closest('.card-actions')) return;

            const filteredList = getActiveList();
            const item = filteredList[index];
            if (!item) return;

            currentLightboxIndex = index;

            lightboxImg.src = ''; 
            lightboxImg.src = item.path || item.url;
            lightboxTitle.innerText = `Wallpaper #${item.id}`;
            
            const resolution = item.resolution || `${item.dimension_x}x${item.dimension_y}`;
            lightboxDetails.innerHTML = `
                <span>Resolution: <strong>${resolution}</strong></span>
                <span>Views: <strong>${item.views || 0}</strong></span>
                <span>Category: <strong>${item.category || 'N/A'}</strong></span>
                <span>Favorites: <strong>${item.favorites || 0}</strong></span>
            `;

            lightbox.classList.add('active');
        }

        function navigateLightbox(direction, event) {
            if (event) event.stopPropagation();

            const filteredList = getActiveList();
            if (filteredList.length === 0) return;

            // Calculate new index wrapping around borders cleanly
            let newIndex = currentLightboxIndex + direction;
            if (newIndex < 0) {
                newIndex = filteredList.length - 1;
            } else if (newIndex >= filteredList.length) {
                newIndex = 0;
            }

            openLightbox(newIndex);
        }

        function closeLightbox(event) {
            if (event.target === lightbox || event.target.classList.contains('lightbox-close') || event.target.tagName === 'BUTTON') {
                lightbox.classList.remove('active');
                currentLightboxIndex = -1;
            }
        }

        function switchTab(tabName) {
            currentTab = tabName;
            
            document.querySelectorAll('.tab').forEach(tab => {
                if (tab.id === `tab-${tabName}`) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            renderWallpapers();
        }

        async function fetchSearch() {
            const query = searchInput.value.trim();
            const limit = limitSelect.value;
            showLoading();

            try {
                const url = `/search?q=${encodeURIComponent(query)}&limit=${limit}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch from search API.');
                
                allWallpapers = await response.json();
                renderWallpapers();
            } catch (err) {
                showError(err.message);
            }
        }

        async function fetchLucky() {
            const limit = limitSelect.value;
            showLoading();

            try {
                const response = await fetch(`/imIlucky?limit=${limit}`);
                if (!response.ok) throw new Error('Failed to fetch from Lucky API.');

                allWallpapers = await response.json();
                renderWallpapers();
            } catch (err) {
                showError(err.message);
            }
        }
    </script>
</body>
</html>
