<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallhaven Explorer</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1e2233;
            --text-color: #e3e6ed;
            --accent-color: #ff79c6;
            --accent-hover: #ff92df;
            --input-bg: #151825;
            --border-color: #2b3045;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--accent-color);
        }

        .search-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: 3rem;
        }

        .search-input {
            flex: 1;
            min-width: 280px;
            max-width: 500px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        /* --- Dropdown Styling --- */
        .select-count {
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .select-count:focus {
            border-color: var(--accent-color);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: translateY(-1px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 121, 198, 0.3);
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
            overflow: hidden;
        }

        .card-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-info {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #8b92ad;
        }

        .card-tag {
            align-self: flex-start;
            background: rgba(255, 121, 198, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .card-actions {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
        }

        .view-link {
            font-size: 0.9rem;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        .view-link:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .status-message {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.2rem;
            color: #8b92ad;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 121, 198, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Haven<span>Wallpapers</span></h1>
            <p>Fetch and explore beautifully cataloged desktop backgrounds</p>
        </header>

        <div class="search-area">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Search wallpapers (e.g. anime, nature)..."
                onkeydown="if(event.key === 'Enter') fetchSearch()"
            >
            
            <select id="limitSelect" class="select-count" title="Entries count">
                <option value="10">10</option>
                <option value="24" selected>24</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>

            <button class="btn btn-primary" onclick="fetchSearch()">Search</button>
            <button class="btn btn-secondary" onclick="fetchLucky()">🎲 I'm Feeling Lucky</button>
        </div>

        <main id="wallpaperGrid" class="grid">
            <div class="status-message">Enter a keyword or click 'I'm Feeling Lucky' to get started!</div>
        </main>
    </div>

    <script>
        const grid = document.getElementById('wallpaperGrid');
        const searchInput = document.getElementById('searchInput');
        const limitSelect = document.getElementById('limitSelect');

        function showLoading() {
            grid.innerHTML = `
                <div class="status-message">
                    <div class="spinner"></div>
                    <div>Fetching wallpapers...</div>
                </div>
            `;
        }

        function showError(msg) {
            grid.innerHTML = `<div class="status-message" style="color: #ff5555;">⚠️ Error: ${msg}</div>`;
        }

        function renderWallpapers(wallpapers) {
            if (!wallpapers || wallpapers.length === 0) {
                grid.innerHTML = '<div class="status-message">No wallpapers found. Try another search query!</div>';
                return;
            }

            grid.innerHTML = wallpapers.map(item => {
                const imgUrl = item.thumbs?.large || item.path; 
                const originalUrl = item.path || item.url;
                const resolution = item.resolution || `${item.dimension_x}x${item.dimension_y}`;
                const category = item.category || 'General';

                return `
                    <article class="card">
                        <div class="card-img-wrapper">
                            <img src="${imgUrl}" alt="Wallpaper ${item.id}" class="card-img" loading="lazy">
                        </div>
                        <div class="card-info">
                            <span class="card-tag">${category}</span>
                            <div class="card-meta">
                                <span>Resolution: <strong>${resolution}</strong></span>
                                <span>Views: <strong>${item.views || 0}</strong></span>
                            </div>
                            <div class="card-actions">
                                <a href="${originalUrl}" target="_blank" class="view-link">View Original File →</a>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        async function fetchSearch() {
            const query = searchInput.value.trim();
            const limit = limitSelect.value;
            showLoading();

            try {
                const url = `/search?q=${encodeURIComponent(query)}&limit=${limit}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch from search API.');
                
                const data = await response.json();
                renderWallpapers(data);
            } catch (err) {
                showError(err.message);
            }
        }

        async function fetchLucky() {
            const limit = limitSelect.value;
            showLoading();

            try {
                const response = await fetch(`/imIlucky?limit=${limit}`);
                if (!response.ok) throw new Error('Failed to fetch from Lucky API.');

                const data = await response.json();
                renderWallpapers(data);
            } catch (err) {
                showError(err.message);
            }
        }
    </script>
</body>
</html>
